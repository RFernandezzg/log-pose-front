<div class="container mx-auto px-4 py-12">
  <div class="hero-section">
    <h1 class="hero-title">{{ 'EVENTS.TITLE' | translate }}</h1>
    <p class="hero-subtitle">{{ 'EVENTS.SUBTITLE' | translate }}</p>
    <button 
      (click)="openCreateModal()"
      class="bg-gold-gradient text-dark-blue px-8 py-3 rounded-full font-bold uppercase tracking-wider hover:scale-105 transition-transform duration-300 shadow-lg shadow-gold/20">
      {{ 'EVENTS.PUBLISH' | translate }}
    </button>
  </div>

  <div *ngIf="isLoading" class="flex justify-center items-center py-20">
    <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-gold"></div>
  </div>

  <div *ngIf="!isLoading && events.length === 0" class="text-center py-20 bg-dark-surface rounded-3xl border border-white/5">
    <i class="fas fa-calendar-times text-6xl text-slate-600 mb-4"></i>
    <p class="text-xl text-slate-400">{{ 'EVENTS.NO_EVENTS' | translate }}</p>
  </div>

  <div *ngIf="!isLoading && events.length > 0" class="events-grid">
    <app-event-card 
      *ngFor="let event of events" 
      [event]="event"
      (statusChanged)="loadEvents()"
      (viewDetails)="openEventDetails($event)">
    </app-event-card>
  </div>
</div>

<app-event-create 
  *ngIf="showCreateModal" 
  (close)="showCreateModal = false"
  (created)="onEventCreated()">
</app-event-create>

<app-event-detail 
  *ngIf="selectedEvent" 
  [event]="selectedEvent" 
  (close)="selectedEvent = null"
  (deleted)="onEventDeleted()"
  (statusChanged)="onStatusChanged()">
</app-event-detail>
